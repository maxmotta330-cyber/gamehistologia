<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flashcards – Histologia</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);min-height:100vh;color:#fff;padding:24px 16px;display:flex;flex-direction:column;align-items:center}
    h1{font-size:1.6rem;color:#7ee8fa;text-align:center;margin-bottom:6px;letter-spacing:1px}
    .subtitle{font-size:.83rem;color:#aecad6;margin-bottom:20px;text-align:center}

    /* SCORE */
    .score-row{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap;justify-content:center}
    .score-item{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:7px 16px;text-align:center}
    .score-item .sv{display:block;font-size:1.2rem;font-weight:800;color:#80ff72}
    .score-item .sl{display:block;font-size:.65rem;color:#aecad6;letter-spacing:1px;text-transform:uppercase}

    /* PROGRESS */
    .prog-wrap{width:100%;max-width:700px;background:rgba(255,255,255,.1);border-radius:20px;height:7px;margin-bottom:8px;overflow:hidden}
    .prog-fill{height:100%;background:linear-gradient(90deg,#7ee8fa,#80ff72);border-radius:20px;transition:width .4s}
    .counter{font-size:.8rem;color:#aecad6;margin-bottom:14px;text-align:center}

    /* FILTROS */
    .filter-wrap{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:700px;margin-bottom:18px}
    .filter-btn{padding:6px 14px;border-radius:20px;border:1px solid rgba(126,232,250,.3);background:rgba(126,232,250,.08);color:#7ee8fa;font-size:.75rem;cursor:pointer;transition:.2s}
    .filter-btn:hover,.filter-btn.active{background:rgba(126,232,250,.25);border-color:#7ee8fa}

    /* CARD */
    .card-scene{width:100%;max-width:700px;perspective:1200px;cursor:pointer;margin-bottom:22px}
    .card-inner{position:relative;width:100%;padding-top:70%;transform-style:preserve-3d;transition:transform .65s cubic-bezier(.4,0,.2,1);border-radius:18px}
    .card-scene.flipped .card-inner{transform:rotateY(180deg)}
    .card-face{position:absolute;top:0;left:0;width:100%;height:100%;border-radius:18px;backface-visibility:hidden;-webkit-backface-visibility:hidden;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5)}

    .card-front{background:#1a2a3a;display:flex;flex-direction:column}
    .card-front img{width:100%;height:78%;object-fit:cover;border-radius:18px 18px 0 0;background:#0d2137}
    .card-question{flex:1;display:flex;align-items:center;justify-content:center;background:rgba(126,232,250,.08);border-top:2px solid rgba(126,232,250,.2);padding:10px}
    .card-question p{font-size:1rem;font-weight:700;color:#7ee8fa;letter-spacing:1px;text-transform:uppercase;text-align:center}

    .card-back{background:linear-gradient(145deg,#0d2137,#1b3a52);transform:rotateY(180deg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;text-align:center}
    .ans-cat{display:inline-block;background:rgba(126,232,250,.12);border:1px solid rgba(126,232,250,.25);color:#7ee8fa;font-size:.7rem;padding:3px 10px;border-radius:20px;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
    .ans-label{font-size:.7rem;color:#7ee8fa;letter-spacing:3px;text-transform:uppercase;margin-bottom:10px}
    .ans-title{font-size:1.4rem;font-weight:800;color:#80ff72;margin-bottom:8px;text-shadow:0 0 12px rgba(128,255,114,.4)}
    .ans-desc{font-size:.85rem;color:#c8dce8;line-height:1.6;max-width:520px}
    .flip-hint{font-size:.7rem;color:rgba(126,232,250,.4);margin-top:14px;font-style:italic}

    /* BOTÕES */
    .btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:12px}
    button{padding:10px 22px;border:none;border-radius:50px;font-size:.88rem;font-weight:600;cursor:pointer;transition:.2s}
    .btn-prev{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2)}
    .btn-prev:hover{background:rgba(255,255,255,.2)}
    .btn-next{background:linear-gradient(90deg,#7ee8fa,#80ff72);color:#0d2137}
    .btn-next:hover{transform:scale(1.04)}
    .btn-know{background:linear-gradient(90deg,#80ff72,#00c853);color:#0d2137}
    .btn-review{background:rgba(255,80,80,.15);color:#ff8080;border:1px solid rgba(255,80,80,.3)}
    .btn-shuffle{background:rgba(255,165,0,.15);color:#ffd580;border:1px solid rgba(255,165,0,.3)}
    .btn-know:hover,.btn-review:hover,.btn-shuffle:hover{transform:scale(1.04)}

    /* THUMBS */
    .thumbs-title{font-size:.72rem;color:#aecad6;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;text-align:center}
    .thumbs{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;max-width:700px;margin-bottom:30px}
    .thumb{width:54px;height:54px;border-radius:8px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:.2s;opacity:.5;position:relative;background:#0d2137}
    .thumb:hover{opacity:1;transform:scale(1.1)}
    .thumb.active{border-color:#7ee8fa;opacity:1;box-shadow:0 0 10px rgba(126,232,250,.5)}
    .thumb img{width:100%;height:100%;object-fit:cover}
    .thumb-num{position:absolute;bottom:1px;right:3px;font-size:.55rem;color:#fff;font-weight:700;text-shadow:0 0 3px #000}

    /* ERRO DE IMAGEM */
    .img-error{width:100%;height:78%;background:linear-gradient(135deg,#0d2137,#1a3a52);display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:18px 18px 0 0}
    .img-error span{font-size:2.5rem;margin-bottom:8px}
    .img-error p{font-size:.75rem;color:#ff8080;text-align:center;padding:0 16px}

    @media(max-width:500px){.ans-title{font-size:1rem}}
  </style>
</head>
<body>

<h1>🔬 Flashcards de Histologia</h1>
<p class="subtitle">Ciclo Básico de Medicina — Suas lâminas reais</p>

<div class="score-row">
  <div class="score-item"><span class="sv" id="sKnow">0</span><span class="sl">✅ Sei</span></div>
  <div class="score-item"><span class="sv" id="sReview" style="color:#ff8080">0</span><span class="sl">🔄 Revisar</span></div>
  <div class="score-item"><span class="sv" id="sTotal" style="color:#7ee8fa">27</span><span class="sl">📋 Total</span></div>
</div>

<div class="prog-wrap"><div class="prog-fill" id="progFill" style="width:3.7%"></div></div>
<p class="counter" id="counterText">Card 1 de 27</p>

<div class="filter-wrap">
  <button class="filter-btn active" onclick="filterCat('Todos')">🔬 Todos (27)</button>
  <button class="filter-btn" onclick="filterCat('Pulmão')">🫁 Pulmão</button>
  <button class="filter-btn" onclick="filterCat('Traqueia')">🌬️ Traqueia</button>
  <button class="filter-btn" onclick="filterCat('Palato')">🦷 Palato</button>
  <button class="filter-btn" onclick="filterCat('Baço')">🩸 Baço</button>
  <button class="filter-btn" onclick="filterCat('Timo')">🧬 Timo</button>
</div>

<div class="card-scene" id="cardScene" onclick="flipCard()">
  <div class="card-inner">
    <div class="card-face card-front" id="cardFront">
      <img id="cardImg" src="" alt="Lâmina histológica" onerror="showImgError(this)"/>
      <div class="card-question"><p>❓ Qual é a estrutura?</p></div>
    </div>
    <div class="card-face card-back">
      <span class="ans-cat" id="cardCat"></span>
      <div class="ans-label">Resposta</div>
      <div class="ans-title" id="cardAns"></div>
      <div class="ans-desc" id="cardDesc"></div>
      <div class="flip-hint">Clique para virar o card</div>
    </div>
  </div>
</div>

<div class="btn-row">
  <button class="btn-prev" onclick="prevCard()">← Anterior</button>
  <button class="btn-know" onclick="markKnow()">✅ Sei!</button>
  <button class="btn-review" onclick="markReview()">🔄 Revisar</button>
  <button class="btn-next" onclick="nextCard()">Próximo →</button>
</div>
<div class="btn-row">
  <button class="btn-shuffle" onclick="shuffleCards()">🔀 Embaralhar</button>
  <button class="btn-prev" onclick="resetCards()">🔁 Reiniciar</button>
</div>

<p class="thumbs-title">Navegação Rápida</p>
<div class="thumbs" id="thumbsContainer"></div>

<script>
const BASE = "https://raw.githubusercontent.com/maxmotta330-cyber/gamehistologia/e02d62e4729378f6177e4d7541c4195c7137f072/";

const ALL_CARDS = [
  // ── PULMÃO ──
  {
    img: BASE + "PHOTO-2026-05-30-16-36-22%20(1).jpeg",
    answer: "Saco Alveolar",
    cat: "Pulmão",
    desc: "Agrupamento terminal de alvéolos que se abrem para um espaço comum. Revestido por pneumócitos tipo I e II, com macrófagos alveolares no interior. Unidade funcional terminal da respiração."
  },
  {
    img: BASE + "PHOTO-2026-05-30-16-36-22%20(2).jpeg",
    answer: "Septo Alveolar",
    cat: "Pulmão",
    desc: "Parede interalveolar fina com pneumócitos tipo I (hematose), tipo II (surfactante), capilares fenestrados e fibras elásticas. Local da barreira alvéolo-capilar onde ocorre a troca gasosa."
  },
  {
    img: BASE + "PHOTO-2026-05-30-16-36-22%20(3).jpeg",
    answer: "Ducto Alveolar",
    cat: "Pulmão",
    desc: "Canal alongado revestido por pneumócitos tipo I e II que se abre diretamente nos sacos alveolares. Suas paredes são formadas quase que inteiramente pelos orifícios de entrada dos alvéolos."
  },
  {
    img: BASE + "PHOTO-2026-05-30-16-36-22.jpeg",
    answer: "Brônquio",
    cat: "Pulmão",
    desc: "Via aérea com epitélio pseudoestratificado colunar ciliado, placas de cartilagem hialina irregular e glândulas submucosas. Difere da traqueia pelas placas (e não anéis) de cartilagem."
  },
  {
    img: BASE + "PHOTO-2026-05-30-16-36-23.jpeg",
    answer: "Bronquíolo",
    cat: "Pulmão",
    desc: "Via aérea sem cartilagem nem glândulas submucosas. Revestido por epitélio colunar simples ciliado com células de Clara. Possui camada muscular lisa proeminente — importante na asma (broncoespasmo)."
  },
  // ── TRAQUEIA ──
  {
    img: BASE + "PHOTO-2026-05-30-16-37-36.jpeg",
    answer: "Traqueia – Camada Cartilaginosa",
    cat: "Traqueia",
    desc: "Formada por 16–20 anéis em C de cartilagem hialina que mantêm a traqueia aberta durante a respiração. A porção posterior é membranosa (músculo traqueal liso)."
  },
  {
    img: BASE + "PHOTO-2026-05-30-16-37-37%20(1).jpeg",
    answer: "Traqueia – Submucosa",
    cat: "Traqueia",
    desc: "Camada de tecido conjuntivo frouxo abaixo da mucosa, contendo glândulas seromucosas mistas (de Bowman), vasos sanguíneos e linfáticos. Suas secreções contribuem para o muco traqueal."
  },
  {
    img: BASE + "PHOTO-2026-05-30-16-37-37%20(2).jpeg",
    answer: "Traqueia – Mucosa",
    cat: "Traqueia",
    desc: "Camada mais interna da traqueia, composta pelo epitélio pseudoestratificado colunar ciliado com células caliciformes e pela lâmina própria de tecido conjuntivo frouxo rico em fibras elásticas."
  },
  {
    img: BASE + "PHOTO-2026-05-30-16-37-37.jpeg",
    answer: "Traqueia – Adventícia",
    cat: "Traqueia",
    desc: "Camada mais externa da traqueia, composta por tecido conjuntivo denso irregular com fibras colágenas, vasos e nervos. Ancora a traqueia às estruturas vizinhas do mediastino."
  },
  // ── PALATO ──
  {
    img: BASE + "PHOTO-2026-05-30-16-39-25%20(1).jpeg",
    answer: "Palato – Célula Caliciforme",
    cat: "Palato",
    desc: "Célula secretora de muco presente no epitélio pseudoestratificado. Possui citoplasma repleto de grânulos de mucina, com núcleo basal achatado. Essencial para a proteção e umidificação das vias aéreas."
  },
  {
    img: BASE + "PHOTO-2026-05-30-16-39-25.jpeg",
    answer: "Palato – Tecido Conjuntivo",
    cat: "Palato",
    desc: "Tecido de suporte composto por fibroblastos, fibras colágenas e elásticas e substância fundamental amorfa. Preenche espaços e sustenta estruturas epiteliais na lâmina própria do palato."
  },
  {
    img: BASE + "PHOTO-2026-05-30-16-39-26%20(1).jpeg",
    answer: "Palato – Célula Basal",
    cat: "Palato",
    desc: "Célula-tronco pequena localizada na base do epitélio pseudoestratificado, apoiada sobre a membrana basal. Não alcança o lúmen. Responsável pela renovação celular do epitélio respiratório."
  },
  {
    img: BASE + "PHOTO-2026-05-30-16-39-26.jpeg",
    answer: "Palato – Célula Colunar",
    cat: "Palato",
    desc: "Célula epitelial alta com núcleo oval localizado na porção basal. Predominante no epitélio pseudoestratificado. Muitas possuem cílios no ápice para transporte mucociliar."
  },
  // ── BAÇO ──
  {
    img: BASE + "PHOTO-2026-05-30-16-40-34%20(1).jpeg",
    answer: "Polpa Branca com Arteríola Central",
    cat: "Baço",
    desc: "Nódulos linfoides (corpúsculos de Malpighi) ao redor de uma arteríola central. A bainha linfocitária periarterial (PALS) contém linfócitos T; os folículos adjacentes contêm linfócitos B."
  },
  {
    img: BASE + "PHOTO-2026-05-30-16-40-34%20(2).jpeg",
    answer: "Trabécula do Baço",
    cat: "Baço",
    desc: "Prolongamentos da cápsula fibrosa que penetram no parênquima esplênico carreando vasos trabeculares. Contêm músculo liso que permite contração esplênica e dividem o órgão em compartimentos."
  },
  {
    img: BASE + "PHOTO-2026-05-30-16-40-34%20(3).jpeg",
    answer: "Cápsula do Baço",
    cat: "Baço",
    desc: "Cápsula de tecido conjuntivo denso com fibras colágenas, elásticas e células musculares lisas. Mais espessa que a do timo. Emite trabéculas para o interior do órgão."
  },
  {
    img: BASE + "PHOTO-2026-05-30-16-40-34.jpeg",
    answer: "Polpa Vermelha",
    cat: "Baço",
    desc: "Ocupa 75–80% do baço. Formada pelos seios esplênicos e cordões de Billroth. Rica em eritrócitos e macrófagos. Função: filtração sanguínea e destruição de hemácias envelhecidas."
  },
  {
    img: BASE + "PHOTO-2026-05-30-16-40-35%20(1).jpeg",
    answer: "Seio Esplênico",
    cat: "Baço",
    desc: "Sinusoide venoso revestido por células endoteliais alongadas (em barril) com fendas entre elas. Permite passagem seletiva de hemácias deformáveis. Eritrócitos rígidos são retidos e fagocitados."
  },
  {
    img: BASE + "PHOTO-2026-05-30-16-40-35.jpeg",
    answer: "Cordão Esplênico",
    cat: "Baço",
    desc: "Cordões de Billroth — rede de células reticulares, macrófagos e células sanguíneas entre os seios esplênicos. Local onde hemácias velhas/anormais são fagocitadas pelos macrófagos residentes."
  },
  // ── TIMO ──
  {
    img: BASE + "PHOTO-2026-05-30-16-41-50%20(1).jpeg",
    answer: "Cápsula do Timo",
    cat: "Timo",
    desc: "Cápsula de tecido conjuntivo denso irregular que envolve o timo externamente. Emite prolongamentos (septos) para o interior do órgão, dividindo-o em lóbulos incompletos."
  },
  {
    img: BASE + "PHOTO-2026-05-30-16-41-50.jpeg",
    answer: "Septo do Timo",
    cat: "Timo",
    desc: "Prolongamentos da cápsula que penetram no parênquima tímico carreando vasos. Dividem o timo em lóbulos, mas não completamente — a medula é contínua entre lóbulos adjacentes."
  },
  {
    img: BASE + "PHOTO-2026-05-30-16-41-51%20(1).jpeg",
    answer: "Medula Tímica",
    cat: "Timo",
    desc: "Região central do lóbulo, mais clara e menos celular. Local da seleção negativa (timócitos autorreativos são eliminados por apoptose). Contém os corpúsculos de Hassall e células dendríticas."
  },
  {
    img: BASE + "PHOTO-2026-05-30-16-41-51%20(2).jpeg",
    answer: "Linfócitos T",
    cat: "Timo",
    desc: "Timócitos em diferentes estágios de maturação. No córtex são imaturos (CD4+CD8+). Na medula tornam-se maduros e selecionados. Saem como linfócitos T naive para a circulação periférica."
  },
  {
    img: BASE + "PHOTO-2026-05-30-16-41-51%20(3).jpeg",
    answer: "Lóbulo Tímico",
    cat: "Timo",
    desc: "Unidade estrutural do timo delimitada pelos septos. Cada lóbulo possui córtex periférico (escuro, rico em timócitos) e medula central (clara, com corpúsculos de Hassall)."
  },
  {
    img: BASE + "PHOTO-2026-05-30-16-41-51.jpeg",
    answer: "Córtex Tímico",
    cat: "Timo",
    desc: "Região periférica do lóbulo tímico, densamente corada por timócitos imaturos em proliferação. Local da seleção positiva (células que reconhecem MHC próprio sobrevivem). Possui barreira hematotímica."
  },
  {
    img: BASE + "PHOTO-2026-05-30-16-41-52%20(1).jpeg",
    answer: "Célula Reticular",
    cat: "Timo",
    desc: "Célula reticular epitelial do timo — grande, com núcleo vesicular e nucléolo evidente. Forma rede de suporte para os timócitos, secreta hormônios tímicos e apresenta antígenos próprios durante seleção tímica."
  },
  {
    img: BASE + "PHOTO-2026-05-30-16-41-52.jpeg",
    answer: "Corpúsculo de Hassall",
    cat: "Timo",
    desc: "Estrutura eosinofílica concêntrica (espiral) formada por células reticulares epiteliais queratinizadas na medula tímica. Marcador histológico do timo. Possível papel na tolerância imunológica."
  },
];

let cards = [...ALL_CARDS];
let current = 0;
let isFlipped = false;
let cardStatus = new Array(ALL_CARDS.length).fill(null);
let scores = {know:0, review:0};
let activeFilter = 'Todos';

function showImgError(img) {
  const front = img.parentElement;
  img.style.display = 'none';
  const div = document.createElement('div');
  div.className = 'img-error';
  div.innerHTML = '<span>🔬</span><p>Imagem não carregada<br><small>Verifique a conexão ou o repositório GitHub</small></p>';
  front.insertBefore(div, front.firstChild);
}

function filterCat(cat) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b =>
    b.classList.toggle('active', b.textContent.includes(cat === 'Todos' ? 'Todos' : cat)));
  cards = cat === 'Todos' ? [...ALL_CARDS] : ALL_CARDS.filter(c => c.cat === cat);
  cardStatus = new Array(cards.length).fill(null);
  scores = {know:0, review:0};
  current = 0;
  document.getElementById('sTotal').textContent = cards.length;
  updateScores();
  buildThumbs();
  loadCard(0);
}

function loadCard(i) {
  isFlipped = false;
  document.getElementById('cardScene').classList.remove('flipped');
  const c = cards[i];

  // Limpa erro anterior se houver
  const front = document.getElementById('cardFront');
  const oldErr = front.querySelector('.img-error');
  if (oldErr) oldErr.remove();
  const imgEl = document.getElementById('cardImg');
  imgEl.style.display = 'block';
  imgEl.src = c.img;

  document.getElementById('cardAns').textContent = c.answer;
  document.getElementById('cardCat').textContent = c.cat;
  document.getElementById('cardDesc').textContent = c.desc;
  document.getElementById('counterText').textContent = `Card ${i+1} de ${cards.length}`;
  document.getElementById('progFill').style.width = ((i+1)/cards.length*100).toFixed(1)+'%';
  updateThumbs();
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('cardScene').classList.toggle('flipped', isFlipped);
}

function nextCard() { current=(current+1)%cards.length; loadCard(current); }
function prevCard() { current=(current-1+cards.length)%cards.length; loadCard(current); }

function markKnow() {
  if(cardStatus[current]!=='know'){
    if(cardStatus[current]==='review') scores.review--;
    scores.know++; cardStatus[current]='know'; updateScores(); updateThumbs();
  } nextCard();
}
function markReview() {
  if(cardStatus[current]!=='review'){
    if(cardStatus[current]==='know') scores.know--;
    scores.review++; cardStatus[current]='review'; updateScores(); updateThumbs();
  } nextCard();
}

function updateScores() {
  document.getElementById('sKnow').textContent = scores.know;
  document.getElementById('sReview').textContent = scores.review;
}

function shuffleCards() {
  for(let i=cards.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [cards[i],cards[j]]=[cards[j],cards[i]];
    [cardStatus[i],cardStatus[j]]=[cardStatus[j],cardStatus[i]];
  }
  current=0; buildThumbs(); loadCard(0);
}

function resetCards() {
  cards=[...ALL_CARDS]; activeFilter='Todos';
  document.querySelectorAll('.filter-btn').forEach(b=>
    b.classList.toggle('active', b.textContent.includes('Todos')));
  cardStatus=new Array(cards.length).fill(null);
  scores={know:0,review:0}; current=0;
  document.getElementById('sTotal').textContent=cards.length;
  updateScores(); buildThumbs(); loadCard(0);
}

function buildThumbs() {
  const c=document.getElementById('thumbsContainer');
  c.innerHTML='';
  cards.forEach((card,i)=>{
    const d=document.createElement('div');
    d.className='thumb'+(i===current?' active':'');
    d.innerHTML=`<img src="${card.img}" alt="${card.answer}"/><span class="thumb-num">${i+1}</span>`;
    const st=cardStatus[i];
    d.style.borderColor=st==='know'?'#80ff72':st==='review'?'#ff8080':'transparent';
    d.style.opacity=(st||i===current)?'1':'.5';
    d.onclick=()=>{current=i;loadCard(i);};
    c.appendChild(d);
  });
}

function updateThumbs() {
  document.querySelectorAll('.thumb').forEach((t,i)=>{
    t.classList.toggle('active',i===current);
    const st=cardStatus[i];
    t.style.borderColor=st==='know'?'#80ff72':st==='review'?'#ff8080':i===current?'#7ee8fa':'transparent';
    t.style.opacity=(st||i===current)?'1':'.5';
  });
}

buildThumbs();
loadCard(0);
</script>
</body>
</html>
